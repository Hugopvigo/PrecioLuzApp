<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrecioLuzApp — iOS 26 liquid glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --ease: cubic-bezier(.22,.61,.36,1); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif; }
  button { font-family: inherit; }

  /* ───────── Device bezel ───────── */
  .device {
    width: 388px; padding: 11px; border-radius: 54px;
    background: linear-gradient(150deg, #2b2d36, #0c0d12 55%, #1b1c22);
    box-shadow: 0 1px 0 rgba(255,255,255,.12) inset, 0 40px 90px rgba(10,12,30,.45), 0 8px 24px rgba(0,0,0,.3);
  }
  .phone {
    position: relative; width: 366px; height: 772px;
    border-radius: 44px; overflow: hidden;
    background: var(--app-bg);
    font-size: 15px; color: var(--text);
    transition: background .55s var(--ease);
    --pill-bg: rgba(255,255,255,.92);
    --pill-sh: 0 6px 16px rgba(20,25,60,.18), 0 1px 0 rgba(255,255,255,.8) inset;
  }

  /* ───────── Theme tokens ───────── */
  .phone[data-theme="light"] {
    --text:#0c0e16; --dim:rgba(12,14,22,.62); --mute:rgba(12,14,22,.42);
    --chip:rgba(10,12,24,.06); --hair:rgba(10,12,24,.08); --app-bg:#e9edf6;
  }
  .phone[data-theme="dark"] {
    --text:#f2f4fb; --dim:rgba(242,244,251,.66); --mute:rgba(242,244,251,.44);
    --chip:rgba(255,255,255,.08); --hair:rgba(255,255,255,.10); --app-bg:#080912;
    --pill-bg: rgba(255,255,255,.18);
    --pill-sh: 0 6px 16px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.25) inset;
  }

  /* ───────── Aurora background ───────── */
  .aurora { position:absolute; inset:-28%; z-index:0; pointer-events:none;
    transition: opacity .65s var(--ease); will-change: transform; }
  .aurora-light {
    opacity:1; animation: drA 19s ease-in-out infinite;
    background:
      radial-gradient(38% 34% at 16% 12%, rgba(255,179,209,.85), transparent 60%),
      radial-gradient(42% 38% at 86% 8%,  rgba(180,210,255,.9), transparent 60%),
      radial-gradient(48% 44% at 84% 82%, rgba(178,255,228,.8), transparent 62%),
      radial-gradient(44% 40% at 8% 86%,  rgba(255,236,176,.85), transparent 62%),
      #eef1f8;
  }
  .aurora-dark {
    opacity:0; animation: drB 23s ease-in-out infinite;
    background:
      radial-gradient(40% 36% at 14% 10%, rgba(124,58,255,.5), transparent 60%),
      radial-gradient(42% 38% at 88% 6%,  rgba(30,107,255,.48), transparent 60%),
      radial-gradient(54% 50% at 86% 84%, rgba(0,211,164,.42), transparent 62%),
      radial-gradient(48% 44% at 6% 90%,  rgba(255,45,132,.42), transparent 62%),
      #080912;
  }
  .phone[data-theme="dark"] .aurora-light { opacity:0; }
  .phone[data-theme="dark"] .aurora-dark  { opacity:1; }
  @keyframes drA {
    0%   { transform: translate3d(-2%,-1%,0) scale(1.05) rotate(0deg); }
    50%  { transform: translate3d(2%,2%,0)   scale(1.12) rotate(4deg); }
    100% { transform: translate3d(-2%,-1%,0) scale(1.05) rotate(0deg); }
  }
  @keyframes drB {
    0%   { transform: translate3d(2%,1%,0)   scale(1.08) rotate(0deg); }
    50%  { transform: translate3d(-2%,-2%,0) scale(1.14) rotate(-5deg); }
    100% { transform: translate3d(2%,1%,0)   scale(1.08) rotate(0deg); }
  }
  .phone-tint { position:absolute; inset:0; z-index:1; pointer-events:none;
    box-shadow: inset 0 0 70px rgba(10,12,30,.05); }

  /* ───────── Glass base ───────── */
  .glass {
    position: relative;
    background: var(--g-bg);
    -webkit-backdrop-filter: blur(var(--g-blur)) saturate(var(--g-sat));
    backdrop-filter: blur(var(--g-blur)) saturate(var(--g-sat));
    border: 1px solid var(--g-brd);
    border-radius: var(--radius);
    box-shadow: var(--g-sh), inset 0 1px 0 var(--g-inset);
    transition: background .55s var(--ease), border-color .55s var(--ease), box-shadow .55s var(--ease);
  }
  .glass::before { content:''; position:absolute; inset:0; border-radius:inherit;
    background: var(--g-hl, none); opacity: var(--g-hl-op,1); pointer-events:none; }
  .glass > * { position: relative; }

  /* FROST */
  .phone[data-variant="frost"][data-theme="light"]{ --g-bg:rgba(255,255,255,.55); --g-blur:22px; --g-sat:150%; --g-brd:rgba(255,255,255,.72); --g-inset:rgba(255,255,255,.6); --g-sh:0 10px 30px rgba(30,35,70,.10); --radius:26px; --g-hl:none; }
  .phone[data-variant="frost"][data-theme="dark"]{  --g-bg:rgba(30,33,48,.52);  --g-blur:24px; --g-sat:150%; --g-brd:rgba(255,255,255,.13); --g-inset:rgba(255,255,255,.08); --g-sh:0 12px 34px rgba(0,0,0,.45); --radius:26px; --g-hl:none; }
  /* LIQUID — iOS 26 signature: tinted + glossy + big radius */
  .phone[data-variant="liquid"][data-theme="light"]{ --g-bg:rgba(255,255,255,.32); --g-blur:30px; --g-sat:200%; --g-brd:rgba(255,255,255,.85); --g-inset:rgba(255,255,255,.85); --g-sh:0 16px 40px rgba(40,30,90,.14); --radius:30px; --g-hl:linear-gradient(135deg, rgba(255,255,255,.6), rgba(255,255,255,0) 42%); --g-hl-op:.9; }
  .phone[data-variant="liquid"][data-theme="dark"]{  --g-bg:rgba(48,42,76,.40);  --g-blur:32px; --g-sat:210%; --g-brd:rgba(255,255,255,.20); --g-inset:rgba(255,255,255,.18); --g-sh:0 18px 44px rgba(0,0,0,.5); --radius:30px; --g-hl:linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,0) 40%); --g-hl-op:1; }
  /* CLEAR — ultra transparente, fino */
  .phone[data-variant="clear"][data-theme="light"]{ --g-bg:rgba(255,255,255,.22); --g-blur:13px; --g-sat:135%; --g-brd:rgba(255,255,255,.55); --g-inset:rgba(255,255,255,.4); --g-sh:0 8px 24px rgba(30,35,70,.08); --radius:24px; --g-hl:none; }
  .phone[data-variant="clear"][data-theme="dark"]{  --g-bg:rgba(16,18,30,.30);  --g-blur:15px; --g-sat:140%; --g-brd:rgba(255,255,255,.10); --g-inset:rgba(255,255,255,.06); --g-sh:0 10px 26px rgba(0,0,0,.4); --radius:24px; --g-hl:none; }

  /* ───────── Status bar ───────── */
  .statusbar { position:absolute; top:0; left:0; right:0; height:46px; z-index:6;
    display:flex; align-items:center; justify-content:space-between; padding:0 24px;
    color: var(--text); }
  .sb-time { font-size:14.5px; font-weight:700; letter-spacing:.01em; }
  .sb-cam { position:absolute; left:50%; top:13px; transform:translateX(-50%);
    width:11px; height:11px; border-radius:999px; background:#000; opacity:.85; }
  .sb-icons { display:flex; align-items:center; gap:6px; }

  /* ───────── Scroll area ───────── */
  .scroll { position:absolute; inset:0; z-index:2; overflow-y:auto;
    padding:52px 16px 116px; display:flex; flex-direction:column; gap:14px;
    scrollbar-width:none; }
  .scroll::-webkit-scrollbar { display:none; }
  .scroll > * { flex: 0 0 auto; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; margin-top:2px; }
  .brand { display:flex; align-items:center; gap:11px; }
  .brand-mark { width:38px; height:38px; border-radius:12px; color:#fff;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(140deg,#ffc24d,#ff7a00); box-shadow:0 7px 18px rgba(255,140,0,.42); }
  .brand-name { font-size:18px; font-weight:800; letter-spacing:-.02em; color:var(--text); line-height:1.1; }
  .brand-sub { font-size:11px; color:var(--mute); font-weight:500; margin-top:1px; }
  .theme-btn { width:40px; height:40px; border-radius:999px; display:flex; align-items:center;
    justify-content:center; color:var(--text); cursor:pointer; border:none; }
  .theme-btn:active { transform: translateY(1px); }

  /* Day head */
  .day-head { display:flex; align-items:flex-end; justify-content:space-between; margin-top:2px; }
  .day-title { font-size:30px; font-weight:800; letter-spacing:-.03em; color:var(--text); line-height:1; }
  .day-date { font-size:12.5px; color:var(--dim); margin-top:5px; text-transform:capitalize; }
  .day-stamp { display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; color:var(--dim); }
  .live-dot { position:relative; width:7px; height:7px; border-radius:999px; background:#30d158; flex-shrink:0; }
  .live-dot::after { content:''; position:absolute; inset:0; border-radius:999px; background:#30d158;
    animation: ping 1.9s var(--ease) infinite; }
  @keyframes ping { 0%{transform:scale(1);opacity:.7} 75%,100%{transform:scale(2.6);opacity:0} }

  /* Hero */
  .hero { padding:18px 20px 19px; overflow:hidden; }
  .hero-glow { position:absolute; inset:0; border-radius:inherit; pointer-events:none; }
  .hero-label { font-size:12.5px; font-weight:600; color:var(--dim); }
  .hero-row { display:flex; align-items:baseline; gap:8px; margin-top:6px; }
  .hero-num { font-size:52px; font-weight:800; letter-spacing:-.035em; line-height:.95;
    font-variant-numeric:tabular-nums; }
  .hero-unit { font-size:16px; font-weight:600; color:var(--dim); }
  .hero-meta { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .hero-trend { display:flex; align-items:center; gap:4px; font-size:12.5px; font-weight:700; }
  .hero-sub { font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums; }

  /* Stat row */
  .statrow { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat { padding:13px 12px; }
  .stat-k { font-size:11.5px; font-weight:600; color:var(--mute); display:flex; align-items:center; gap:4px; }
  .stat-emoji { font-size:11px; }
  .stat-v { font-size:19px; font-weight:800; letter-spacing:-.02em; margin-top:5px; font-variant-numeric:tabular-nums; }
  .stat-h { font-size:10.5px; color:var(--mute); margin-top:2px; font-variant-numeric:tabular-nums; }

  /* Reco */
  .reco { padding:5px 6px; }
  .reco-row { display:flex; align-items:center; gap:12px; padding:11px 12px; }
  .reco-emoji { width:42px; height:42px; border-radius:13px; display:flex; align-items:center;
    justify-content:center; font-size:21px; flex-shrink:0; }
  .reco-k { font-size:12px; font-weight:700; }
  .reco-v { font-size:13.5px; font-weight:600; color:var(--text); margin-top:2px; font-variant-numeric:tabular-nums; }
  .reco-div { height:1px; background:var(--hair); margin:0 12px; }

  /* Chart */
  .chart { padding:16px; }
  .chart-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
  .chart-title { display:flex; align-items:center; gap:7px; font-size:13.5px; font-weight:700; color:var(--text); }
  .chart-sel { text-align:right; }
  .chart-sel-h { display:block; font-size:11px; color:var(--mute); font-variant-numeric:tabular-nums; }
  .chart-sel-v { font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; }
  .bars { display:flex; align-items:flex-end; gap:3px; height:112px; }
  .bar { flex:1; height:100%; display:flex; align-items:flex-end; justify-content:center;
    position:relative; background:none; border:none; padding:0; cursor:pointer; }
  .bar-fill { width:100%; max-width:9px; border-radius:4px 4px 2px 2px;
    transition: height .35s var(--ease), opacity .2s, box-shadow .2s; }
  .bar-now { position:absolute; top:-3px; left:50%; transform:translateX(-50%);
    width:5px; height:5px; border-radius:999px; background:var(--text); }
  .bars-axis { display:flex; justify-content:space-between; margin-top:9px;
    font-size:10.5px; color:var(--mute); font-variant-numeric:tabular-nums; }

  /* Legend */
  .legend { display:flex; flex-wrap:wrap; gap:10px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--dim); }

  /* Hour list */
  .list { padding:14px 14px 8px; }
  .list-head { display:flex; flex-direction:column; gap:10px; margin-bottom:4px; }
  .list-head > span { font-size:13.5px; font-weight:700; color:var(--text); }
  .list-rows { display:flex; flex-direction:column; }
  .row { display:flex; align-items:center; gap:10px; padding:9px 4px; border-top:1px solid var(--hair); }
  .row:first-child { border-top:none; }
  .row-now { background:var(--chip); border-radius:12px; padding-left:8px; padding-right:8px; }
  .row-h { width:60px; font-size:12.5px; font-weight:600; color:var(--text); flex-shrink:0; font-variant-numeric:tabular-nums; }
  .row-tramo { width:62px; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim); flex-shrink:0; }
  .row-track { flex:1; height:6px; border-radius:999px; background:var(--chip); overflow:hidden; }
  .row-bar { display:block; height:100%; border-radius:999px; transition:width .4s var(--ease); }
  .row-mark { width:18px; text-align:center; font-size:13px; }
  .row-now-dot { display:inline-block; width:7px; height:7px; border-radius:999px; background:var(--text); }
  .row-price { width:50px; text-align:right; font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; }

  .screen-foot { text-align:center; font-size:10.5px; color:var(--mute); margin-top:4px; line-height:1.5; padding:0 12px; }

  /* Tab bar */
  .tabbar { position:absolute; left:50%; bottom:24px; transform:translateX(-50%); z-index:7;
    width:212px; padding:5px; display:flex; border-radius:999px; }
  .tab-pill { position:absolute; top:5px; left:5px; width:calc(50% - 5px); height:calc(100% - 10px);
    border-radius:999px; background:var(--pill-bg); box-shadow:var(--pill-sh);
    transition: transform .38s var(--ease); }
  .tab { flex:1; position:relative; z-index:1; display:flex; align-items:center; justify-content:center;
    gap:7px; height:42px; border-radius:999px; border:none; background:none; cursor:pointer;
    font-size:14px; font-weight:600; color:var(--dim); transition: color .3s var(--ease); }
  .tab-on { color:var(--text); }

  .navpill { position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    width:120px; height:5px; border-radius:3px; background:var(--text); opacity:.28; z-index:7; }

  /* Canvas mount helper */
  .ab-center { display:flex; align-items:center; justify-content:center; height:100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ════════════ design-canvas.jsx ════════════ -->
<script type="text/babel">
const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

if (!document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{isolation:isolate;transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-header{position:absolute;bottom:100%;left:-4px;margin-bottom:calc(4px * var(--dc-inv-zoom,1));z-index:2;display:flex;align-items:center;container-type:inline-size}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px;flex:1 1 auto;min-width:0}',
    '.dc-grip{flex:0 0 auto;cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s,opacity .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{flex:1 1 auto;min-width:0;cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s;overflow:hidden}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-labeltext .dc-editable{overflow:hidden;text-overflow:ellipsis;max-width:100%}',
    '.dc-labeltext .dc-editable:focus{overflow:visible;text-overflow:clip}',
    '.dc-btns{flex:0 0 auto;margin-left:auto;display:flex;gap:2px;opacity:0;transition:opacity .12s}',
    '[data-dc-slot]:hover .dc-btns,.dc-btns:has(.dc-menu){opacity:1}',
    '.dc-expand,.dc-kebab{width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center;font:inherit;transition:background .12s,color .12s}',
    '.dc-expand:hover,.dc-kebab:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:has(.dc-menu){z-index:10}',
    '.dc-menu{position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);padding:4px;min-width:160px;z-index:10}',
    '.dc-menu button{display:block;width:100%;padding:7px 10px;border:0;background:transparent;border-radius:5px;font-family:inherit;font-size:13px;font-weight:500;line-height:1.2;color:#29261b;cursor:pointer;text-align:left;transition:background .12s;white-space:nowrap}',
    '.dc-menu button:hover{background:rgba(0,0,0,.05)}',
    '.dc-menu hr{border:0;border-top:1px solid rgba(0,0,0,.08);margin:4px 2px}',
    '.dc-menu .dc-danger{color:#c96442}',
    '.dc-menu .dc-danger:hover{background:rgba(201,100,66,.1)}',
    '.dc-header{width:calc((100% + 4px) / var(--dc-inv-zoom,1));transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom left}',
    '.dc-sectionhead{zoom:var(--dc-inv-zoom,1)}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

function dcFlatten(children) {
  const out = [];
  React.Children.forEach(children, (c) => {
    if (c && c.type === React.Fragment) out.push(...dcFlatten(c.props.children));
    else out.push(c);
  });
  return out;
}

const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  const registry = {};
  const sectionMeta = {};
  const sectionOrder = [];
  dcFlatten(children).forEach((sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const abs = [];
    dcFlatten(sec.props.children).forEach((ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (aid) abs.push([aid, ab]);
    });
    const srcKey = abs.map(([k]) => k).join('\x1f');
    const hidden = persisted.srcKey === srcKey ? (persisted.hidden || []) : [];
    const srcIds = [];
    abs.forEach(([aid, ab]) => {
      if (hidden.includes(aid)) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });
  const tfKey = 'dc-viewport:' + location.pathname;
  const saveT = React.useRef(0);

  const lastPostedScale = React.useRef();
  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (!el) return;
    el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
    el.style.setProperty('--dc-inv-zoom', String(1 / scale));
    if (lastPostedScale.current !== scale) {
      lastPostedScale.current = scale;
      window.parent.postMessage({ type: '__dc_zoom', scale }, '*');
    }
    clearTimeout(saveT.current);
    saveT.current = setTimeout(() => {
      try { localStorage.setItem(tfKey, JSON.stringify(tf.current)); } catch {}
    }, 200);
  }, [tfKey]);

  React.useLayoutEffect(() => {
    const flush = () => {
      clearTimeout(saveT.current);
      try { localStorage.setItem(tfKey, JSON.stringify(tf.current)); } catch {}
    };
    try {
      const s = JSON.parse(localStorage.getItem(tfKey) || 'null');
      if (s && Number.isFinite(s.x) && Number.isFinite(s.y) && Number.isFinite(s.scale)) {
        tf.current = { x: s.x, y: s.y, scale: Math.min(maxScale, Math.max(minScale, s.scale)) };
        apply();
      }
    } catch {}
    window.addEventListener('pagehide', flush);
    return () => { window.removeEventListener('pagehide', flush); flush(); };
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      let marker = null, markerY0 = 0;
      if (k !== 1) {
        const hit = document.elementFromPoint(cx, cy);
        marker = hit && hit.closest ? hit.closest('[data-dc-slot],[data-dc-section]') : null;
        if (marker) markerY0 = marker.getBoundingClientRect().top;
      }
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
      if (marker) {
        const drift = marker.getBoundingClientRect().top - (cy + (markerY0 - cy) * k);
        if (Math.abs(drift) > 0.1) { t.y -= drift; apply(); }
      }
    };

    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return;
      if ((e.ctrlKey || e.metaKey) && !isMouseWheel(e)) {
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    let gsBase = 1, isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => { e.preventDefault(); zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale); };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    const onHostMsg = (e) => {
      const d = e.data;
      if (d && d.type === '__dc_set_zoom' && typeof d.scale === 'number') {
        const r = vp.getBoundingClientRect();
        zoomAt(r.left + r.width / 2, r.top + r.height / 2, d.scale / tf.current.scale);
      } else if (d && d.type === '__dc_probe') {
        window.parent.postMessage({ type: '__dc_present' }, '*');
        lastPostedScale.current = undefined;
        apply();
      }
    };
    window.addEventListener('message', onHostMsg);
    window.parent.postMessage({ type: '__dc_present' }, '*');
    lastPostedScale.current = undefined;
    apply();

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      window.removeEventListener('message', onHostMsg);
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div ref={vpRef} className="design-canvas" style={{
      height: '100vh', width: '100vw', background: DC.bg,
      overflow: 'hidden', overscrollBehavior: 'none', touchAction: 'none',
      position: 'relative', fontFamily: DC.font, boxSizing: 'border-box', ...style,
    }}>
      <div ref={worldRef} style={{
        position: 'absolute', top: 0, left: 0, transformOrigin: '0 0',
        willChange: 'transform', width: 'max-content', minWidth: '100%', minHeight: '100%',
        padding: '60px 0 80px',
      }}>
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(dcFlatten(children));
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const sec = (ctx && sid && ctx.section(sid)) || {};
  const allIds = artboards.map((a) => a.props.id ?? a.props.label).filter(Boolean);
  const srcKey = allIds.join('\x1f');
  const hidden = sec.srcKey === srcKey ? (sec.hidden || []) : [];
  const srcOrder = allIds.filter((k) => !hidden.includes(k));

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 'calc(80px * var(--dc-inv-zoom, 1))', position: 'relative' }}>
      <div style={{ padding: '0 60px' }}>
        <div className="dc-sectionhead" style={{ paddingBottom: 36 }}>
          <DCEditable tag="div" value={sec.title ?? title}
            onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
            style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
          {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
        </div>
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onDelete={() => ctx && ctx.patchSection(sid, (x) => ({
              hidden: [...(x.srcKey === srcKey ? (x.hidden || []) : []), k],
              srcKey,
            }))}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

function DCArtboard() { return null; }

async function dcExport(node, w, h, name, kind) {
  try { await document.fonts.ready; } catch {}
  const toDataURL = (url) => fetch(url).then((r) => r.blob()).then((b) => new Promise((res) => {
    const fr = new FileReader(); fr.onload = () => res(fr.result); fr.onerror = () => res(url); fr.readAsDataURL(b);
  })).catch(() => url);

  const fontRules = [], pending = [], seen = new Set();
  const scrapeCss = (href) => {
    if (seen.has(href)) return; seen.add(href);
    pending.push(fetch(href).then((r) => r.text()).then((css) => {
      for (const m of css.match(/@font-face\s*{[^}]*}/g) || []) fontRules.push({ css: m, base: href });
      for (const m of css.matchAll(/@import\s+(?:url\()?['"]?([^'")\s;]+)/g))
        scrapeCss(new URL(m[1], href).href);
    }).catch(() => {}));
  };
  const walk = (rules, base) => {
    for (const r of rules) {
      if (r.type === CSSRule.FONT_FACE_RULE) fontRules.push({ css: r.cssText, base });
      else if (r.type === CSSRule.IMPORT_RULE && r.styleSheet) {
        const ibase = r.styleSheet.href || base;
        try { walk(r.styleSheet.cssRules, ibase); } catch { scrapeCss(ibase); }
      } else if (r.cssRules) walk(r.cssRules, base);
    }
  };
  for (const ss of document.styleSheets) {
    const base = ss.href || location.href;
    try { walk(ss.cssRules, base); } catch { if (ss.href) scrapeCss(ss.href); }
  }
  while (pending.length) await pending.shift();
  const fontCss = (await Promise.all(fontRules.map(async (rule) => {
    let out = rule.css, m; const re = /url\((['"]?)([^'")]+)\1\)/g;
    while ((m = re.exec(rule.css))) {
      if (m[2].indexOf('data:') === 0) continue;
      let abs; try { abs = new URL(m[2], rule.base).href; } catch { continue; }
      out = out.split(m[0]).join('url("' + await toDataURL(abs) + '")');
    }
    return out;
  }))).join('\n');

  const cloneStyled = (src) => {
    if (src.nodeType === 8 || (src.nodeType === 1 && src.tagName === 'SCRIPT')) return document.createTextNode('');
    const dst = src.cloneNode(false);
    if (src.nodeType === 1) {
      const cs = getComputedStyle(src); let txt = '';
      for (let i = 0; i < cs.length; i++) txt += cs[i] + ':' + cs.getPropertyValue(cs[i]) + ';';
      dst.setAttribute('style', txt + 'animation:none;transition:none;');
      if (src.tagName === 'CANVAS') try { const im = document.createElement('img'); im.src = src.toDataURL(); im.setAttribute('style', txt); return im; } catch {}
    }
    for (let c = src.firstChild; c; c = c.nextSibling) dst.appendChild(cloneStyled(c));
    return dst;
  };
  const clone = cloneStyled(node);
  clone.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
  clone.style.boxShadow = 'none'; clone.style.borderRadius = '0';

  const jobs = [];
  clone.querySelectorAll('img').forEach((el) => {
    const s = el.getAttribute('src');
    if (s && s.indexOf('data:') !== 0) jobs.push(toDataURL(el.src).then((d) => el.setAttribute('src', d)));
  });
  [clone, ...clone.querySelectorAll('*')].forEach((el) => {
    const bg = el.style.backgroundImage; if (!bg) return;
    let m; const re = /url\(["']?([^"')]+)["']?\)/g;
    while ((m = re.exec(bg))) {
      const tok = m[0], url = m[1];
      if (url.indexOf('data:') === 0) continue;
      jobs.push(toDataURL(url).then((d) => { el.style.backgroundImage = el.style.backgroundImage.split(tok).join('url("' + d + '")'); }));
    }
  });
  await Promise.all(jobs);

  const xml = new XMLSerializer().serializeToString(clone);
  const save = (blob, ext) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name + '.' + ext; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  };

  if (kind === 'html') {
    const html = '<!doctype html><html><head><meta charset="utf-8"><title>' + name + '</title>' +
      (fontCss ? '<style>' + fontCss + '</style>' : '') +
      '</head><body style="margin:0">' + xml + '</body></html>';
    return save(new Blob([html], { type: 'text/html' }), 'html');
  }

  const px = 3;
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w * px + '" height="' + h * px +
    '" viewBox="0 0 ' + w + ' ' + h + '"><foreignObject width="' + w + '" height="' + h + '">' +
    (fontCss ? '<style><![CDATA[' + fontCss + ']]></style>' : '') + xml + '</foreignObject></svg>';
  const img = new Image();
  await new Promise((res, rej) => {
    img.onload = res; img.onerror = () => rej(new Error('svg load failed'));
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  });
  const cv = document.createElement('canvas');
  cv.width = w * px; cv.height = h * px;
  cv.getContext('2d').drawImage(img, 0, 0);
  cv.toBlob((blob) => save(blob, 'png'), 'image/png');
}

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus, onDelete }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);
  const cardRef = React.useRef(null);
  const menuRef = React.useRef(null);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [confirming, setConfirming] = React.useState(false);

  React.useEffect(() => {
    if (!menuOpen) { setConfirming(false); return; }
    const off = (e) => { if (!menuRef.current || !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('pointerdown', off, true);
    return () => document.removeEventListener('pointerdown', off, true);
  }, [menuOpen]);

  const doExport = (kind) => {
    setMenuOpen(false);
    if (!cardRef.current) return;
    const name = String(label || id || 'artboard').replace(/[^\w\s.-]+/g, '_');
    dcExport(cardRef.current, width, height, name, kind)
      .catch((e) => console.error('[design-canvas] export failed:', e));
  };

  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-header" data-omelette-chrome="" style={{ color: DC.label }} onPointerDown={(e) => e.stopPropagation()}>
        <div className="dc-labelrow">
          <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
            <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
          </div>
          <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
            <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
              style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
          </div>
        </div>
        <div className="dc-btns">
          <div ref={menuRef} style={{ position: 'relative' }}>
            <button className="dc-kebab" title="More" onClick={() => setMenuOpen((o) => !o)}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="2.5" cy="6" r="1.1"/><circle cx="6" cy="6" r="1.1"/><circle cx="9.5" cy="6" r="1.1"/></svg>
            </button>
            {menuOpen && (
              <div className="dc-menu" onPointerDown={(e) => e.stopPropagation()}>
                <button onClick={() => doExport('png')}>Download PNG</button>
                <button onClick={() => doExport('html')}>Download HTML</button>
                <hr />
                <button className="dc-danger"
                  onClick={() => { if (confirming) { setMenuOpen(false); onDelete(); } else setConfirming(true); }}>
                  {confirming ? 'Click again to delete' : 'Delete'}
                </button>
              </div>
            )}
          </div>
          <button className="dc-expand" onClick={onFocus} title="Focus">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
          </button>
        </div>
      </div>
      <div ref={cardRef} className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];

              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>

          </button>

              {sectionOrder.filter((sid) => sectionMeta[sid].slotIds.length).map((sid) => (

                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}

        {peers.map((p, i) => (

              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />

}

<script type="text/babel">
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const BASE_TODAY = [
  0.090, 0.085, 0.082, 0.080, 0.078, 0.083, 0.095, 0.110,
  0.135, 0.150, 0.165, 0.160, 0.140, 0.120, 0.105, 0.095,
  0.092, 0.100, 0.175, 0.215, 0.245, 0.230, 0.165, 0.120,
];
const BASE_TOMORROW = [
  0.078, 0.072, 0.070, 0.069, 0.071, 0.075, 0.088, 0.102,
  0.120, 0.132, 0.128, 0.110, 0.090, 0.072, 0.068, 0.070,
  0.082, 0.110, 0.165, 0.205, 0.240, 0.215, 0.150, 0.105,
];

function tramoForHour(hour, date) {
  const dow = date.getDay();
  if (dow === 0 || dow === 6) return 'valle';
  if ((hour >= 10 && hour < 14) || (hour >= 18 && hour < 22)) return 'punta';
  if (hour < 8) return 'valle';
  return 'llano';
}

function buildDay(base, date, seed) {
  const rnd = mulberry32(seed);
  const hours = base.map((p, hour) => {
    const noise = (rnd() - 0.5) * 0.008;
    const price = Math.max(0.03, +(p + noise).toFixed(4));
    return { hour, price, tramo: tramoForHour(hour, date) };
  });
  return { date, hours };
}

const TIERS = ['green', 'yellow', 'orange', 'red'];

function decorate(day) {
  const sorted = [...day.hours].sort((a, b) => a.price - b.price);
  const rankByHour = {};
  sorted.forEach((h, i) => { rankByHour[h.hour] = i; });

  const prices = day.hours.map((h) => h.price);
  const sum = prices.reduce((a, b) => a + b, 0);
  const avg = sum / prices.length;
  const minH = sorted[0];
  const maxH = sorted[sorted.length - 1];

  const hours = day.hours.map((h) => {
    const rank = rankByHour[h.hour];
    const tier = TIERS[Math.min(3, Math.floor(rank / 6))];
    return { ...h, rank, tier, isMin: h.hour === minH.hour, isMax: h.hour === maxH.hour, isCheap3: rank < 3, isPricey3: rank >= 21 };
  });

  let best = { i: 0, sum: Infinity }, worst = { i: 0, sum: -Infinity };
  for (let i = 0; i < 23; i++) {
    const s = hours[i].price + hours[i + 1].price;
    if (s < best.sum) best = { i, sum: s };
    if (s > worst.sum) worst = { i, sum: s };
  }

  return {
    date: day.date, hours, avg,
    min: minH, max: maxH,
    bestWindow: [best.i, best.i + 1],
    worstWindow: [worst.i, worst.i + 1],
    spread: maxH.price - minH.price,
  };
}

const _now = new Date();
const _today = new Date(_now.getFullYear(), _now.getMonth(), _now.getDate());
const _tomorrow = new Date(_today.getTime() + 86400000);

const LUZ = {
  now: _now,
  currentHour: _now.getHours(),
  hoy: decorate(buildDay(BASE_TODAY, _today, 20260530)),
  manana: decorate(buildDay(BASE_TOMORROW, _tomorrow, 20260531)),
  tiers: TIERS,
};

function fmtPrice(p, decimals = 3) {
  return p.toLocaleString('es-ES', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtHour(h) { return String(h).padStart(2, '0') + ':00'; }
function fmtRange(h) {
  const end = (h + 1) % 24;
  return `${String(h).padStart(2, '0')}–${String(end).padStart(2, '0')}h`;
}
function fmtDate(d) {
  return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}
function fmtDateShort(d) {
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}
const TRAMO_LABEL = { valle: 'Valle', llano: 'Llano', punta: 'Punta' };

Object.assign(window, { LUZ, fmtPrice, fmtHour, fmtRange, fmtDate, fmtDateShort, TRAMO_LABEL });
</script>

<script type="text/babel">
const TIER_LIGHT = { green: '#15A34A', yellow: '#C28A00', orange: '#E26A07', red: '#E11D2E' };
const TIER_DARK  = { green: '#30D158', yellow: '#FFD60A', orange: '#FF9F0A', red: '#FF6961' };
const TIER_LABEL = { green: 'Barato', yellow: 'Moderado', orange: 'Caro', red: 'Muy caro' };
function tc(tier, theme) { return (theme === 'dark' ? TIER_DARK : TIER_LIGHT)[tier]; }
function tierSoft(tier, theme, a = 0.16) {
  const hex = tc(tier, theme);
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function StatusBar({ theme, now }) {
  const t = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  return (
    <div className="statusbar">
      <span className="sb-time">{t}</span>
      <div className="sb-cam" />
      <div className="sb-icons">
        <Ic.Signal /><Ic.Wifi /><Ic.Battery />
      </div>
    </div>
  );
}

function Tag({ children, color, soft, strong }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '4px 9px', borderRadius: 999, fontSize: 11.5,
      fontWeight: 600, letterSpacing: '.01em', lineHeight: 1,
      color: color, background: soft,
      border: strong ? `1px solid ${color}33` : 'none',
    }}>{children}</span>
  );
}
function Dot({ color, size = 8 }) {
  return <span style={{ width: size, height: size, borderRadius: 999, background: color, flexShrink: 0, boxShadow: `0 0 8px ${color}66`, display: 'inline-block' }} />;
}

function AppHeader({ theme, choice, onCycle }) {
  const icon = choice === 'auto' ? <Ic.Auto size={18} /> : choice === 'light' ? <Ic.Sun size={18} /> : <Ic.Moon size={18} />;
  return (
    <div className="header">
      <div className="brand">
        <div className="brand-mark"><Ic.Bolt size={17} /></div>
        <div>
          <div className="brand-name">PrecioLuz</div>
          <div className="brand-sub">Precio de la luz · PVPC</div>
        </div>
      </div>
      <button className="theme-btn glass" onClick={onCycle} aria-label="Cambiar tema" title={`Tema: ${choice}`}>
        {icon}
      </button>
    </div>
  );
}

function Hero({ day, theme, isToday, currentHour }) {
  let value, label, tier, sub, trendEl = null;
  if (isToday) {
    const cur = day.hours[currentHour];
    value = cur.price; tier = cur.tier;
    label = `Ahora · ${fmtRange(currentHour)}`;
    const nxt = day.hours[(currentHour + 1) % 24];
    const up = nxt.price >= cur.price;
    sub = TRAMO_LABEL[cur.tramo];
    trendEl = (
      <div className="hero-trend" style={{ color: up ? tc('red', theme) : tc('green', theme) }}>
        {up ? <Ic.Up size={15} /> : <Ic.Down size={15} />}
        <span>{up ? 'Sube' : 'Baja'} a las {fmtHour((currentHour + 1) % 24)}</span>
      </div>
    );
  } else {
    value = day.avg; tier = day.hours[day.min.hour].tier;
    label = 'Precio medio · mañana';
    sub = `Mín ${fmtPrice(day.min.price)} · Máx ${fmtPrice(day.max.price)}`;
  }
  const color = tc(tier, theme);
  return (
    <div className="glass hero" style={{ '--accent': color }}>
      <div className="hero-glow" style={{ background: `radial-gradient(120% 90% at 85% 0%, ${tierSoft(tier, theme, 0.45)}, transparent 60%)` }} />
      <div className="hero-label">{label}</div>
      <div className="hero-row">
        <div className="hero-num" style={{ color }}>{fmtPrice(value)}</div>
        <div className="hero-unit">€/kWh</div>
      </div>
      <div className="hero-meta">
        <Tag color={color} soft={tierSoft(tier, theme, 0.18)} strong>
          <Dot color={color} size={7} />{isToday ? TIER_LABEL[tier] : 'estimado'}
        </Tag>
        {isToday && <Tag color="var(--dim)" soft="var(--chip)">{sub}</Tag>}
        {trendEl}
        {!isToday && <span className="hero-sub">{sub}</span>}
      </div>
    </div>
  );
}

function StatRow({ day, theme }) {
  const items = [
    { k: 'Mínima', v: day.min.price, h: day.min.hour, tier: 'green', icon: '💰' },
    { k: 'Media', v: day.avg, h: null, tier: null, icon: null },
    { k: 'Máxima', v: day.max.price, h: day.max.hour, tier: 'red', icon: '💀' },
  ];
  return (
    <div className="statrow">
      {items.map((it) => {
        const color = it.tier ? tc(it.tier, theme) : 'var(--text)';
        return (
          <div className="glass stat" key={it.k}>
            <div className="stat-k">{it.k}{it.icon && <span className="stat-emoji">{it.icon}</span>}</div>
            <div className="stat-v" style={{ color }}>{fmtPrice(it.v)}</div>
            <div className="stat-h">{it.h !== null ? fmtRange(it.h) : '€/kWh'}</div>
          </div>
        );
      })}
    </div>
  );
}

function RecoCard({ day, theme }) {
  const [b0, b1] = day.bestWindow;
  const bestAvg = (day.hours[b0].price + day.hours[b1].price) / 2;
  const g = tc('green', theme), r = tc('red', theme);
  return (
    <div className="glass reco">
      <div className="reco-row">
        <div className="reco-emoji" style={{ background: tierSoft('green', theme, 0.18), boxShadow: `0 0 18px ${tierSoft('green', theme, 0.4)}` }}>💰</div>
        <div className="reco-body">
          <div className="reco-k" style={{ color: g }}>Mejor momento para enchufar</div>
          <div className="reco-v">{fmtHour(b0)}–{fmtHour((b1 + 1) % 24)} · {fmtPrice(bestAvg)} €/kWh</div>
        </div>
      </div>
      <div className="reco-div" />
      <div className="reco-row">
        <div className="reco-emoji" style={{ background: tierSoft('red', theme, 0.18), boxShadow: `0 0 18px ${tierSoft('red', theme, 0.4)}` }}>💀</div>
        <div className="reco-body">
          <div className="reco-k" style={{ color: r }}>Hora más cara — evítala</div>
          <div className="reco-v">{fmtRange(day.max.hour)} · {fmtPrice(day.max.price)} €/kWh</div>
        </div>
      </div>
    </div>
  );
}

function Chart({ day, theme, isToday, currentHour }) {
  const def = isToday ? currentHour : day.min.hour;
  const [sel, setSel] = React.useState(def);
  const max = day.max.price;
  const selH = day.hours[sel];
  const selColor = tc(selH.tier, theme);
  return (
    <div className="glass chart">
      <div className="chart-head">
        <div className="chart-title"><Ic.Chart size={16} /><span>24 horas</span></div>
        <div className="chart-sel">
          <span className="chart-sel-h">{fmtRange(sel)}</span>
          <span className="chart-sel-v" style={{ color: selColor }}>{fmtPrice(selH.price)} €/kWh</span>
        </div>
      </div>
      <div className="bars">
        {day.hours.map((h) => {
          const hgt = 12 + (h.price / max) * 88;
          const isSel = h.hour === sel;
          const isNow = isToday && h.hour === currentHour;
          const color = tc(h.tier, theme);
          return (
            <button key={h.hour} className={'bar' + (isSel ? ' bar-sel' : '')}
              onClick={() => setSel(h.hour)} aria-label={fmtRange(h.hour)}>
              {isNow && <span className="bar-now" />}
              <span className="bar-fill" style={{
                height: `${hgt}%`, background: color,
                boxShadow: isSel ? `0 0 12px ${color}, 0 0 0 1.5px ${color}` : 'none',
                opacity: isSel ? 1 : 0.92,
              }} />
            </button>
          );
        })}
      </div>
      <div className="bars-axis">
        <span>00</span><span>06</span><span>12</span><span>18</span><span>23</span>
      </div>
    </div>
  );
}

function Legend({ theme }) {
  return (
    <div className="legend">
      {['green', 'yellow', 'orange', 'red'].map((t) => (
        <span className="legend-item" key={t}>
          <Dot color={tc(t, theme)} size={7} />{TIER_LABEL[t]}
        </span>
      ))}
    </div>
  );
}

function HourList({ day, theme, isToday, currentHour }) {
  const max = day.max.price;
  return (
    <div className="glass list">
      <div className="list-head">
        <span>Todas las horas</span>
        <Legend theme={theme} />
      </div>
      <div className="list-rows">
        {day.hours.map((h) => {
          const color = tc(h.tier, theme);
          const isNow = isToday && h.hour === currentHour;
          const pct = (h.price / max) * 100;
          return (
            <div className={'row' + (isNow ? ' row-now' : '')} key={h.hour}>
              <span className="row-h">{fmtRange(h.hour)}</span>
              <span className="row-tramo"><Dot color={color} size={7} />{TRAMO_LABEL[h.tramo]}</span>
              <span className="row-track"><span className="row-bar" style={{ width: `${pct}%`, background: color }} /></span>
              <span className="row-mark">
                {h.isMin ? '💰' : h.isMax ? '💀' : isNow ? <span className="row-now-dot" /> : ''}
              </span>
              <span className="row-price" style={{ color: h.isMin || h.isMax ? color : 'var(--text)' }}>{fmtPrice(h.price)}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, {
  StatusBar, AppHeader, Hero, StatRow, RecoCard, Chart, Legend, HourList,
  tc, tierSoft, TIER_LABEL,
});
</script>

<script type="text/babel">
const { useState: useState2, useEffect: useEffect2 } = React;

const themeStore = (() => {
  let v = localStorage.getItem('luz-theme') || 'auto';
  const subs = new Set();
  return {
    get: () => v,
    set: (nv) => { v = nv; localStorage.setItem('luz-theme', nv); subs.forEach((f) => f(v)); },
    sub: (f) => { subs.add(f); return () => subs.delete(f); },
  };
})();

function useTheme() {
  const [choice, setChoice] = useState2(themeStore.get());
  useEffect2(() => themeStore.sub(setChoice), []);
  const mq = () => window.matchMedia('(prefers-color-scheme: dark)');
  const [sysDark, setSysDark] = useState2(() => mq().matches);
  useEffect2(() => {
    const m = mq();
    const f = (e) => setSysDark(e.matches);
    m.addEventListener('change', f);
    return () => m.removeEventListener('change', f);
  }, []);
  const eff = choice === 'auto' ? (sysDark ? 'dark' : 'light') : choice;
  const cycle = () => themeStore.set(choice === 'auto' ? 'light' : choice === 'light' ? 'dark' : 'auto');
  return { choice, eff, cycle };
}

function TabBar({ tab, setTab }) {
  const tabs = [
    { id: 'hoy', label: 'Hoy', Icon: Ic.Sun },
    { id: 'manana', label: 'Mañana', Icon: Ic.Moon },
  ];
  const idx = tab === 'hoy' ? 0 : 1;
  return (
    <div className="tabbar glass">
      <span className="tab-pill" style={{ transform: `translateX(${idx * 100}%)` }} />
      {tabs.map((t) => (
        <button key={t.id} className={'tab' + (tab === t.id ? ' tab-on' : '')} onClick={() => setTab(t.id)}>
          <t.Icon size={18} />
          <span>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function Screen({ day, theme, isToday, currentHour }) {
  return (
    <>
      <div className="day-head">
        <div>
          <div className="day-title">{isToday ? 'Hoy' : 'Mañana'}</div>
          <div className="day-date">{fmtDate(day.date)}</div>
        </div>
        <div className="day-stamp">
          {isToday ? <><span className="live-dot" />En directo</> : 'Previsión'}
        </div>
      </div>
      <Hero day={day} theme={theme} isToday={isToday} currentHour={currentHour} />
      <StatRow day={day} theme={theme} />
      <RecoCard day={day} theme={theme} />
      <Chart day={day} theme={theme} isToday={isToday} currentHour={currentHour} />
      <HourList day={day} theme={theme} isToday={isToday} currentHour={currentHour} />
      <div className="screen-foot">Datos PVPC · {fmtDateShort(day.date)} · precios con impuestos incluidos</div>
    </>
  );
}

function PhoneApp({ variant = 'frost' }) {
  const { choice, eff, cycle } = useTheme();
  const tabKey = `luz-tab-${variant}`;
  const [tab, setTab] = useState2(() => localStorage.getItem(tabKey) || 'hoy');
  useEffect2(() => { localStorage.setItem(tabKey, tab); }, [tab, tabKey]);

  const isToday = tab === 'hoy';
  const day = isToday ? LUZ.hoy : LUZ.manana;

  return (
    <div className="device">
      <div className="phone" data-theme={eff} data-variant={variant}>
        <div className="aurora aurora-light" />
        <div className="aurora aurora-dark" />
        <div className="phone-tint" />

        <StatusBar theme={eff} now={LUZ.now} />

        <div className="scroll" key={tab}>
          <AppHeader theme={eff} choice={choice} onCycle={cycle} />
          <Screen day={day} theme={eff} isToday={isToday} currentHour={LUZ.currentHour} />
        </div>

        <TabBar tab={tab} setTab={setTab} />
        <div className="navpill" />
      </div>
    </div>
  );
}

window.PhoneApp = PhoneApp;
</script>
